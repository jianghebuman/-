server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api}

spring:
  application:
    name: campus-recruitment
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:campus_recruitment}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:campus_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:20MB}
      max-request-size: ${MAX_REQUEST_SIZE:50MB}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campus.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

campus:
  jwt:
    secret: ${JWT_SECRET}
    expire: ${JWT_EXPIRE:604800000}
    header: ${JWT_HEADER:Authorization}
  upload:
    path: ${CAMPUS_UPLOAD_PATH:/opt/campus-recruitment/upload/}
    prefix: ${CAMPUS_UPLOAD_PREFIX:/upload/}
  enterprise-verification:
    enabled: ${ENTERPRISE_VERIFY_ENABLED:false}
    source-name: ${ENTERPRISE_VERIFY_SOURCE_NAME:国家企业信用信息公示系统}
    source-url: ${ENTERPRISE_VERIFY_SOURCE_URL:https://www.gsxt.gov.cn/}
    query-url: ${ENTERPRISE_VERIFY_QUERY_URL:}
    company-name-field: ${ENTERPRISE_VERIFY_COMPANY_NAME_FIELD:data.companyName}
    credit-code-field: ${ENTERPRISE_VERIFY_CREDIT_CODE_FIELD:data.creditCode}
    status-field: ${ENTERPRISE_VERIFY_STATUS_FIELD:data.status}
    normal-statuses: ${ENTERPRISE_VERIFY_NORMAL_STATUSES:存续,在业,正常,开业}

logging:
  file:
    name: ${LOG_FILE:/opt/campus-recruitment/logs/campus-recruitment.log}
  level:
    root: ${LOG_LEVEL_ROOT:info}
    com.campus: ${LOG_LEVEL_CAMPUS:info}
